[package]
name = "ant-ffi"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "staticlib", "lib"]

[dependencies]
autonomi = { path = "../../../../autonomi/autonomi" }
blsttc = "8"
bytes = "1"
hex = "0.4"
libp2p = "0.56.0"
thiserror = "1.0"
tokio = { version = "1", features = ["rt-multi-thread"] }
uniffi = { workspace = true, features = ["tokio"] }

[build-dependencies]
uniffi = { version = "0.29.4", features = ["build"] }
