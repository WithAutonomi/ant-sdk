[package]
name = "antd"
version = "0.3.0"
edition = "2021"

[dependencies]
ant-core = { path = "../../ant-client/ant-core" }
self_encryption = "0.35.0"
evmlib = "0.8.0"
axum = { version = "0.8", features = ["macros"] }
tower-http = { version = "0.6", features = ["cors", "limit", "trace"] }
tonic = "0.12"
prost = "0.13"
tokio = { version = "1", features = ["full"] }
tokio-stream = { version = "0.1", features = ["net"] }
dirs = "6"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
hex = "0.4"
bytes = "1"
base64 = "0.22"
blake3 = "1"
rmp-serde = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
clap = { version = "4", features = ["derive", "env"] }
thiserror = "2"
futures = "0.3"
rand = "0.8"
postcard = { version = "1.1.3", features = ["use-std"] }

[build-dependencies]
tonic-build = "0.12"

# Local-test overrides (branch: local-test/ipv6-stack) — redirect saorsa-core
# to the local sibling checkout so PRs #91/#92 (merged to upstream/main but
# not yet published) are linked transitively through ant-node. Revert before
# merging anywhere.
[patch.crates-io]
saorsa-core = { path = "../../saorsa-core" }
