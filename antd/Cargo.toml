[package]
name = "antd"
version = "0.10.1-rc.1"
edition = "2021"

[dependencies]
ant-core = { git = "https://github.com/WithAutonomi/ant-client", tag = "ant-cli-v0.2.8" }  # ant-core 0.2.8 release; includes file_download_to_sender + DownloadEvent (#111)
self_encryption = "0.36.0"
evmlib = "0.8.1"
axum = { version = "0.8", features = ["macros"] }
tower-http = { version = "0.6", features = ["cors", "limit", "trace"] }
tonic = "0.12"
prost = "0.13"
tokio = { version = "1", features = ["full"] }
tokio-stream = { version = "0.1", features = ["net"] }
dirs = "6"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
hex = "0.4"
bytes = "1"
base64 = "0.22"
blake3 = "1"
rmp-serde = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
clap = { version = "4", features = ["derive", "env"] }
thiserror = "2"
futures = "0.3"
rand = "0.8"
postcard = { version = "1.1.3", features = ["use-std"] }
toml = "0.8"

[build-dependencies]
tonic-build = "0.12"
