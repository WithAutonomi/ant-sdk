[package]
name = "antd"
version = "0.3.0"
edition = "2021"

[dependencies]
ant-core = { git = "https://github.com/WithAutonomi/ant-client" }
self_encryption = "0.35.0"
evmlib = "0.8.0"
axum = { version = "0.8", features = ["macros"] }
tower-http = { version = "0.6", features = ["cors", "limit", "trace"] }
tonic = "0.12"
prost = "0.13"
tokio = { version = "1", features = ["full"] }
tokio-stream = { version = "0.1", features = ["net"] }
dirs = "6"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
hex = "0.4"
bytes = "1"
base64 = "0.22"
blake3 = "1"
rmp-serde = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
clap = { version = "4", features = ["derive", "env"] }
thiserror = "2"
futures = "0.3"
rand = "0.8"
postcard = { version = "1.1.3", features = ["use-std"] }

[build-dependencies]
tonic-build = "0.12"

# Pin saorsa-core to the PR #92 merge commit on upstream main so CI runners
# can resolve PRs #91 (Windows IPv6 split-stack) and #92 (mapped-v4
# normalization in Happy Eyeballs), which are required for reliable operation
# on Windows but ship after the latest v0.23.1 release. Drop this block
# once saorsa-core publishes a release > v0.23.1 that includes both PRs.
[patch.crates-io]
saorsa-core = { git = "https://github.com/saorsa-labs/saorsa-core", rev = "50734d0416dce646da74f4477c9d4f46fa0cb969" }
