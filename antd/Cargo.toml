[package]
name = "antd"
version = "0.1.0"
edition = "2024"

[dependencies]
autonomi = { path = "../../autonomi/autonomi" }
ant-evm = { path = "../../autonomi/ant-evm" }
ant-protocol = { path = "../../autonomi/ant-protocol" }
axum = { version = "0.8", features = ["macros"] }
tower-http = { version = "0.6", features = ["cors", "trace"] }
tonic = "0.12"
prost = "0.13"
tokio = { version = "1", features = ["full"] }
tokio-stream = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
hex = "0.4"
bytes = "1"
base64 = "0.22"
rmp-serde = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
clap = { version = "4", features = ["derive", "env"] }
thiserror = "2"
futures = "0.3"

[build-dependencies]
tonic-build = "0.12"
