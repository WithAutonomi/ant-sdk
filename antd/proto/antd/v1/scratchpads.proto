syntax = "proto3";

package antd.v1;

option csharp_namespace = "Antd.V1";

import "antd/v1/common.proto";

service ScratchpadService {
  rpc Get(GetScratchpadRequest) returns (GetScratchpadResponse);
  rpc CheckExistence(CheckScratchpadRequest) returns (ScratchpadExistsResponse);
  rpc Create(CreateScratchpadRequest) returns (CreateScratchpadResponse);
  rpc Update(UpdateScratchpadRequest) returns (UpdateScratchpadResponse);
  rpc GetCost(ScratchpadCostRequest) returns (Cost);
}

message GetScratchpadRequest {
  string address = 1; // hex
}

message GetScratchpadResponse {
  string address = 1;
  uint64 data_encoding = 2;
  bytes data = 3; // encrypted data
  uint64 counter = 4;
}

message CheckScratchpadRequest {
  string address = 1; // hex
}

message ScratchpadExistsResponse {
  bool exists = 1;
}

message CreateScratchpadRequest {
  string owner_secret_key = 1; // hex
  uint64 content_type = 2;
  bytes data = 3;
}

message CreateScratchpadResponse {
  Cost cost = 1;
  string address = 2; // hex
}

message UpdateScratchpadRequest {
  string owner_secret_key = 1; // hex
  uint64 content_type = 2;
  bytes data = 3;
}

message UpdateScratchpadResponse {}

message ScratchpadCostRequest {
  string public_key = 1; // hex
}
