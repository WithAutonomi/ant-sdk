syntax = "proto3";

package antd.v1;

option csharp_namespace = "Antd.V1";

import "antd/v1/common.proto";

service GraphService {
  rpc Get(GetGraphEntryRequest) returns (GetGraphEntryResponse);
  rpc CheckExistence(CheckGraphEntryRequest) returns (GraphExistsResponse);
  rpc Put(PutGraphEntryRequest) returns (PutGraphEntryResponse);
  rpc GetCost(GraphEntryCostRequest) returns (Cost);
}

message GetGraphEntryRequest {
  string address = 1; // hex
}

message GetGraphEntryResponse {
  string owner = 1;
  repeated string parents = 2;
  string content = 3; // hex, 32 bytes
  repeated GraphDescendant descendants = 4;
}

message CheckGraphEntryRequest {
  string address = 1; // hex
}

message GraphExistsResponse {
  bool exists = 1;
}

message PutGraphEntryRequest {
  string owner_secret_key = 1; // hex
  repeated string parents = 2; // hex public keys
  string content = 3;          // hex, 32 bytes
  repeated GraphDescendant descendants = 4;
}

message PutGraphEntryResponse {
  Cost cost = 1;
  string address = 2; // hex
}

message GraphEntryCostRequest {
  string public_key = 1; // hex
}
