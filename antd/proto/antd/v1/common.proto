syntax = "proto3";

package antd.v1;

option csharp_namespace = "Antd.V1";

message Cost {
  string atto_tokens = 1; // AttoTokens as string (can exceed JS Number.MAX_SAFE_INTEGER)

  // Fields populated only by cost-estimation RPCs (GetCost, GetFileCost).
  // Left at zero/empty for cost values returned by put/upload RPCs, where
  // payment already happened and these fields are not meaningful.
  uint64 file_size = 2;               // original file size in bytes
  uint32 chunk_count = 3;             // number of data chunks the file splits into
  string estimated_gas_cost_wei = 4;  // gas heuristic as string (can exceed JS safe int)
  string payment_mode = 5;            // "auto" | "merkle" | "single"
}

message Address {
  string hex = 1;
}

message PublicKeyProto {
  string hex = 1;
}

message SecretKeyProto {
  string hex = 1;
}

message GraphDescendant {
  string public_key = 1; // hex
  string content = 2;    // hex, 32 bytes
}
