syntax = "proto3";

package antd.v1;

option csharp_namespace = "Antd.V1";

import "antd/v1/common.proto";

service RegisterService {
  rpc Get(GetRegisterRequest) returns (GetRegisterResponse);
  rpc Create(CreateRegisterRequest) returns (CreateRegisterResponse);
  rpc Update(UpdateRegisterRequest) returns (UpdateRegisterResponse);
  rpc GetCost(RegisterCostRequest) returns (Cost);
}

message GetRegisterRequest {
  string address = 1; // hex
}

message GetRegisterResponse {
  string value = 1; // hex, 32 bytes
}

message CreateRegisterRequest {
  string owner_secret_key = 1; // hex
  string initial_value = 2;    // hex, 32 bytes
}

message CreateRegisterResponse {
  Cost cost = 1;
  string address = 2; // hex
}

message UpdateRegisterRequest {
  string owner_secret_key = 1; // hex
  string new_value = 2;        // hex, 32 bytes
}

message UpdateRegisterResponse {
  Cost cost = 1;
}

message RegisterCostRequest {
  string public_key = 1; // hex
}
