openapi: 3.1.0
info:
  title: antd REST API
  description: REST API for the antd daemon — gateway to the Autonomi network.
  version: 1.0.0

servers:
  - url: http://localhost:8082
    description: Local antd daemon

tags:
  - name: health
    description: Daemon health checks
  - name: data
    description: Public and private data storage
  - name: chunks
    description: Raw chunk operations
  - name: files
    description: File and directory upload/download

paths:
  /health:
    get:
      tags: [health]
      operationId: health
      summary: Health check
      description: Returns daemon status and network name.
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /v1/data/public/{addr}:
    get:
      tags: [data]
      operationId: dataGetPublic
      summary: Get public data
      description: Retrieve public (unencrypted) data by its hex address.
      parameters:
        - name: addr
          in: path
          required: true
          schema:
            type: string
          description: Hex address of the data
      responses:
        "200":
          description: Data retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataGetResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/data/public/{addr}/stream:
    get:
      tags: [data]
      operationId: dataStreamPublic
      summary: Stream public data
      description: Stream public data as a chunked response.
      parameters:
        - name: addr
          in: path
          required: true
          schema:
            type: string
          description: Hex address of the data
      responses:
        "200":
          description: Chunked data stream
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/data/public:
    post:
      tags: [data]
      operationId: dataPutPublic
      summary: Store public data
      description: Store public (unencrypted) data on the network.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DataPutRequest"
      responses:
        "200":
          description: Data stored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataPutPublicResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "402":
          $ref: "#/components/responses/PaymentError"
        "413":
          $ref: "#/components/responses/TooLarge"
        "500":
          $ref: "#/components/responses/InternalError"
        "502":
          $ref: "#/components/responses/NetworkError"

  /v1/data/private:
    get:
      tags: [data]
      operationId: dataGetPrivate
      summary: Get private data
      description: Retrieve private (encrypted) data using a data map.
      parameters:
        - name: data_map
          in: query
          required: true
          schema:
            type: string
          description: Hex-encoded data map
      responses:
        "200":
          description: Data retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataGetResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [data]
      operationId: dataPutPrivate
      summary: Store private data
      description: Store private (encrypted) data on the network. Returns a data map.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DataPutRequest"
      responses:
        "200":
          description: Data stored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataPutPrivateResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "402":
          $ref: "#/components/responses/PaymentError"
        "500":
          $ref: "#/components/responses/InternalError"
        "502":
          $ref: "#/components/responses/NetworkError"

  /v1/data/cost:
    post:
      tags: [data]
      operationId: dataCost
      summary: Estimate data storage cost
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DataCostRequest"
      responses:
        "200":
          description: Cost estimate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CostResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "502":
          $ref: "#/components/responses/NetworkError"

  /v1/chunks/{addr}:
    get:
      tags: [chunks]
      operationId: chunkGet
      summary: Get chunk
      description: Retrieve a raw chunk by hex address.
      parameters:
        - name: addr
          in: path
          required: true
          schema:
            type: string
          description: Hex address of the chunk
      responses:
        "200":
          description: Chunk data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChunkGetResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/chunks:
    post:
      tags: [chunks]
      operationId: chunkPut
      summary: Store chunk
      description: Store a raw chunk on the network.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChunkPutRequest"
      responses:
        "200":
          description: Chunk stored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChunkPutResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "402":
          $ref: "#/components/responses/PaymentError"
        "500":
          $ref: "#/components/responses/InternalError"
        "502":
          $ref: "#/components/responses/NetworkError"

  /v1/files/upload/public:
    post:
      tags: [files]
      operationId: fileUploadPublic
      summary: Upload file
      description: Upload a local file to the network (public).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FileUploadRequest"
      responses:
        "200":
          description: File uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileUploadPublicResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "402":
          $ref: "#/components/responses/PaymentError"
        "500":
          $ref: "#/components/responses/InternalError"
        "502":
          $ref: "#/components/responses/NetworkError"

  /v1/files/download/public:
    post:
      tags: [files]
      operationId: fileDownloadPublic
      summary: Download file
      description: Download a file from the network to a local path.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FileDownloadRequest"
      responses:
        "200":
          description: File downloaded
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
        "502":
          $ref: "#/components/responses/NetworkError"

  /v1/dirs/upload/public:
    post:
      tags: [files]
      operationId: dirUploadPublic
      summary: Upload directory
      description: Upload a local directory to the network (public, recursive).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FileUploadRequest"
      responses:
        "200":
          description: Directory uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DirUploadPublicResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "402":
          $ref: "#/components/responses/PaymentError"
        "500":
          $ref: "#/components/responses/InternalError"
        "502":
          $ref: "#/components/responses/NetworkError"

  /v1/dirs/download/public:
    post:
      tags: [files]
      operationId: dirDownloadPublic
      summary: Download directory
      description: Download a directory from the network to a local path.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FileDownloadRequest"
      responses:
        "200":
          description: Directory downloaded
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
        "502":
          $ref: "#/components/responses/NetworkError"

  /v1/cost/file:
    post:
      tags: [files]
      operationId: fileCost
      summary: Estimate file upload cost
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FileCostRequest"
      responses:
        "200":
          description: Cost estimate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CostResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "502":
          $ref: "#/components/responses/NetworkError"

components:
  schemas:
    # -- Health --
    HealthResponse:
      type: object
      required: [status, network]
      properties:
        status:
          type: string
          example: "ok"
        network:
          type: string
          example: "local"
          description: "Network name: default, local, or alpha"

    # -- Data --
    DataPutRequest:
      type: object
      required: [data]
      properties:
        data:
          type: string
          description: Base64-encoded data

    DataPutPublicResponse:
      type: object
      required: [cost, address]
      properties:
        cost:
          type: string
          description: Cost in atto tokens
        address:
          type: string
          description: Hex address of stored data

    DataPutPrivateResponse:
      type: object
      required: [cost, data_map]
      properties:
        cost:
          type: string
          description: Cost in atto tokens
        data_map:
          type: string
          description: Hex-encoded data map for retrieval

    DataGetResponse:
      type: object
      required: [data]
      properties:
        data:
          type: string
          description: Base64-encoded data

    DataCostRequest:
      type: object
      required: [data]
      properties:
        data:
          type: string
          description: Base64-encoded data to estimate cost for

    # -- Chunks --
    ChunkPutRequest:
      type: object
      required: [data]
      properties:
        data:
          type: string
          description: Base64-encoded chunk data

    ChunkPutResponse:
      type: object
      required: [cost, address]
      properties:
        cost:
          type: string
          description: Cost in atto tokens
        address:
          type: string
          description: Hex address of the chunk

    ChunkGetResponse:
      type: object
      required: [data]
      properties:
        data:
          type: string
          description: Base64-encoded chunk data

    # -- Files --
    FileUploadRequest:
      type: object
      required: [path]
      properties:
        path:
          type: string
          description: Absolute path to local file or directory

    FileUploadPublicResponse:
      type: object
      required: [cost, address]
      properties:
        cost:
          type: string
        address:
          type: string

    DirUploadPublicResponse:
      type: object
      required: [cost, address]
      properties:
        cost:
          type: string
        address:
          type: string

    FileDownloadRequest:
      type: object
      required: [address, dest_path]
      properties:
        address:
          type: string
          description: Hex address of the file/directory
        dest_path:
          type: string
          description: Absolute local path to save to

    FileCostRequest:
      type: object
      required: [path]
      properties:
        path:
          type: string
          description: Absolute path to local file
        is_public:
          type: boolean
          default: true
    # -- Common --
    CostResponse:
      type: object
      required: [cost]
      properties:
        cost:
          type: string
          description: Cost in atto tokens

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: Error message

  responses:
    BadRequest:
      description: Invalid request (400)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    PaymentError:
      description: Insufficient funds (402)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found (404)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Resource already exists or version conflict (409)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    TooLarge:
      description: Payload too large (413)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalError:
      description: Internal server error (500)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NetworkError:
      description: Network unreachable (502)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
