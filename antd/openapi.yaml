openapi: 3.1.0
info:
  title: antd REST API
  description: REST API for the antd daemon — gateway to the Autonomi network.
  version: 1.0.0

servers:
  - url: http://localhost:8082
    description: Local antd daemon

tags:
  - name: health
    description: Daemon health checks
  - name: data
    description: Public and private data storage
  - name: chunks
    description: Raw chunk operations
  - name: files
    description: File and directory upload/download
  - name: wallet
    description: Wallet balance, address, and token approval
  - name: upload
    description: Two-phase upload for external signers

paths:
  /health:
    get:
      tags: [health]
      operationId: health
      summary: Health check
      description: Returns daemon status and network name.
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /v1/data/public/{addr}:
    get:
      tags: [data]
      operationId: dataGetPublic
      summary: Get public data
      description: Retrieve public (unencrypted) data by its hex address.
      parameters:
        - name: addr
          in: path
          required: true
          schema:
            type: string
          description: Hex address of the data
      responses:
        "200":
          description: Data retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataGetResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/data/public/{addr}/stream:
    get:
      tags: [data]
      operationId: dataStreamPublic
      summary: Stream public data
      description: Stream public data as a chunked response.
      parameters:
        - name: addr
          in: path
          required: true
          schema:
            type: string
          description: Hex address of the data
      responses:
        "200":
          description: Chunked data stream
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/data/public:
    post:
      tags: [data]
      operationId: dataPutPublic
      summary: Store public data
      description: Store public (unencrypted) data on the network.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DataPutRequest"
      responses:
        "200":
          description: Data stored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataPutPublicResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "402":
          $ref: "#/components/responses/PaymentError"
        "413":
          $ref: "#/components/responses/TooLarge"
        "500":
          $ref: "#/components/responses/InternalError"
        "502":
          $ref: "#/components/responses/NetworkError"

  /v1/data/private:
    get:
      tags: [data]
      operationId: dataGetPrivate
      summary: Get private data
      description: Retrieve private (encrypted) data using a data map.
      parameters:
        - name: data_map
          in: query
          required: true
          schema:
            type: string
          description: Hex-encoded data map
      responses:
        "200":
          description: Data retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataGetResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [data]
      operationId: dataPutPrivate
      summary: Store private data
      description: Store private (encrypted) data on the network. Returns a data map.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DataPutRequest"
      responses:
        "200":
          description: Data stored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataPutPrivateResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "402":
          $ref: "#/components/responses/PaymentError"
        "500":
          $ref: "#/components/responses/InternalError"
        "502":
          $ref: "#/components/responses/NetworkError"

  /v1/data/cost:
    post:
      tags: [data]
      operationId: dataCost
      summary: Estimate data storage cost
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DataCostRequest"
      responses:
        "200":
          description: Cost estimate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CostResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "502":
          $ref: "#/components/responses/NetworkError"

  /v1/chunks/{addr}:
    get:
      tags: [chunks]
      operationId: chunkGet
      summary: Get chunk
      description: Retrieve a raw chunk by hex address.
      parameters:
        - name: addr
          in: path
          required: true
          schema:
            type: string
          description: Hex address of the chunk
      responses:
        "200":
          description: Chunk data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChunkGetResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/chunks:
    post:
      tags: [chunks]
      operationId: chunkPut
      summary: Store chunk
      description: Store a raw chunk on the network.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChunkPutRequest"
      responses:
        "200":
          description: Chunk stored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChunkPutResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "402":
          $ref: "#/components/responses/PaymentError"
        "500":
          $ref: "#/components/responses/InternalError"
        "502":
          $ref: "#/components/responses/NetworkError"

  /v1/files/upload/public:
    post:
      tags: [files]
      operationId: fileUploadPublic
      summary: Upload file
      description: Upload a local file to the network (public).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FileUploadRequest"
      responses:
        "200":
          description: File uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileUploadPublicResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "402":
          $ref: "#/components/responses/PaymentError"
        "500":
          $ref: "#/components/responses/InternalError"
        "502":
          $ref: "#/components/responses/NetworkError"

  /v1/files/download/public:
    post:
      tags: [files]
      operationId: fileDownloadPublic
      summary: Download file
      description: Download a file from the network to a local path.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FileDownloadRequest"
      responses:
        "200":
          description: File downloaded
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
        "502":
          $ref: "#/components/responses/NetworkError"

  /v1/dirs/upload/public:
    post:
      tags: [files]
      operationId: dirUploadPublic
      summary: Upload directory
      description: Upload a local directory to the network (public, recursive).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FileUploadRequest"
      responses:
        "200":
          description: Directory uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DirUploadPublicResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "402":
          $ref: "#/components/responses/PaymentError"
        "500":
          $ref: "#/components/responses/InternalError"
        "502":
          $ref: "#/components/responses/NetworkError"

  /v1/dirs/download/public:
    post:
      tags: [files]
      operationId: dirDownloadPublic
      summary: Download directory
      description: Download a directory from the network to a local path.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FileDownloadRequest"
      responses:
        "200":
          description: Directory downloaded
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
        "502":
          $ref: "#/components/responses/NetworkError"

  /v1/cost/file:
    post:
      tags: [files]
      operationId: fileCost
      summary: Estimate file upload cost
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FileCostRequest"
      responses:
        "200":
          description: Cost estimate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CostResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "502":
          $ref: "#/components/responses/NetworkError"

  # ── Wallet ──

  /v1/wallet/address:
    get:
      tags: [wallet]
      operationId: walletAddress
      summary: Get wallet address
      description: Return the public address of the daemon's configured wallet.
      responses:
        "200":
          description: Wallet address
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletAddressResponse"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /v1/wallet/balance:
    get:
      tags: [wallet]
      operationId: walletBalance
      summary: Get wallet balance
      description: >-
        Query the EVM chain for the wallet's current token and gas balances.
        Token balance is in atto (1 token = 10^18 atto).
        Gas balance is in wei.
      responses:
        "200":
          description: Wallet balances
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletBalanceResponse"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /v1/wallet/approve:
    post:
      tags: [wallet]
      operationId: walletApprove
      summary: Approve token spend
      description: >-
        Submit an ERC-20 approve transaction so the data-payments contract
        can spend tokens on behalf of the wallet. Required before uploads
        when using a fresh wallet.
      responses:
        "200":
          description: Approval successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletApproveResponse"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  # ── External Signer (two-phase upload) ──

  /v1/data/prepare:
    post:
      tags: [upload]
      operationId: prepareDataUpload
      summary: Prepare data upload for external signer
      description: >-
        Phase 1 of two-phase upload for in-memory data. Encrypts and chunks
        the data, collects storage quotes from the network, and returns a
        payment intent. The caller signs and submits the EVM payment
        transaction externally, then calls /v1/upload/finalize with the
        transaction hashes.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PrepareDataUploadRequest"
      responses:
        "200":
          description: Upload prepared, payment intent returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrepareUploadResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /v1/upload/prepare:
    post:
      tags: [upload]
      operationId: prepareFileUpload
      summary: Prepare file upload for external signer
      description: >-
        Phase 1 of two-phase upload for a local file. Reads and encrypts
        the file, collects storage quotes from the network, and returns
        payment details. The response includes a payment_type discriminator
        ("wave_batch" for < 64 chunks, "merkle" for >= 64 chunks) that
        determines which contract call and finalize parameters to use.
        For wave_batch, call payForQuotes() then finalize with tx_hashes.
        For merkle, call payForMerkleTree() then finalize with winner_pool_hash.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PrepareUploadRequest"
      responses:
        "200":
          description: Upload prepared, payment intent returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrepareUploadResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /v1/upload/finalize:
    post:
      tags: [upload]
      operationId: finalizeUpload
      summary: Finalize externally-signed upload
      description: >-
        Phase 2 of two-phase upload. Takes the upload_id from a prepare
        call and either tx_hashes (wave_batch) or winner_pool_hash (merkle)
        from the on-chain payment. The server detects the payment type
        from the stored prepared upload and validates the request fields
        accordingly. Optionally stores the DataMap on-network.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FinalizeUploadRequest"
      responses:
        "200":
          description: Upload finalized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinalizeUploadResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

components:
  schemas:
    # -- Health --
    HealthResponse:
      type: object
      required: [status, network]
      properties:
        status:
          type: string
          example: "ok"
        network:
          type: string
          example: "local"
          description: "Network name: default, local, or alpha"

    # -- Data --
    DataPutRequest:
      type: object
      required: [data]
      properties:
        data:
          type: string
          description: Base64-encoded data
        payment_mode:
          type: string
          enum: [auto, merkle, single]
          default: auto
          description: "Payment mode: auto (default), merkle, or single"

    DataPutPublicResponse:
      type: object
      required: [address, chunks_stored, payment_mode_used]
      properties:
        address:
          type: string
          description: Hex address of stored data
        chunks_stored:
          type: integer
          description: Number of chunks stored on the network
        payment_mode_used:
          type: string
          enum: [auto, merkle, single]
          description: Payment mode that was used

    DataPutPrivateResponse:
      type: object
      required: [data_map, chunks_stored, payment_mode_used]
      properties:
        data_map:
          type: string
          description: Hex-encoded data map for retrieval
        chunks_stored:
          type: integer
          description: Number of chunks stored on the network
        payment_mode_used:
          type: string
          enum: [auto, merkle, single]
          description: Payment mode that was used

    DataGetResponse:
      type: object
      required: [data]
      properties:
        data:
          type: string
          description: Base64-encoded data

    DataCostRequest:
      type: object
      required: [data]
      properties:
        data:
          type: string
          description: Base64-encoded data to estimate cost for

    # -- Chunks --
    ChunkPutRequest:
      type: object
      required: [data]
      properties:
        data:
          type: string
          description: Base64-encoded chunk data

    ChunkPutResponse:
      type: object
      required: [cost, address]
      properties:
        cost:
          type: string
          description: Cost in atto tokens
        address:
          type: string
          description: Hex address of the chunk

    ChunkGetResponse:
      type: object
      required: [data]
      properties:
        data:
          type: string
          description: Base64-encoded chunk data

    # -- Files --
    FileUploadRequest:
      type: object
      required: [path]
      properties:
        path:
          type: string
          description: Absolute path to local file or directory
        payment_mode:
          type: string
          enum: [auto, merkle, single]
          default: auto
          description: "Payment mode: auto (default), merkle, or single"

    FileUploadPublicResponse:
      type: object
      required: [cost, address]
      properties:
        cost:
          type: string
        address:
          type: string

    DirUploadPublicResponse:
      type: object
      required: [cost, address]
      properties:
        cost:
          type: string
        address:
          type: string

    FileDownloadRequest:
      type: object
      required: [address, dest_path]
      properties:
        address:
          type: string
          description: Hex address of the file/directory
        dest_path:
          type: string
          description: Absolute local path to save to

    FileCostRequest:
      type: object
      required: [path]
      properties:
        path:
          type: string
          description: Absolute path to local file
        is_public:
          type: boolean
          default: true
    # -- Wallet --
    WalletAddressResponse:
      type: object
      required: [address]
      properties:
        address:
          type: string
          description: Wallet public address (hex with 0x prefix)
          example: "0x1234abcd..."

    WalletBalanceResponse:
      type: object
      required: [balance, gas_balance]
      properties:
        balance:
          type: string
          description: Token balance in atto (smallest unit)
        gas_balance:
          type: string
          description: Gas token balance in wei

    WalletApproveResponse:
      type: object
      required: [approved]
      properties:
        approved:
          type: boolean
          description: Whether the token spend was approved

    # -- External Signer (two-phase upload) --
    PrepareDataUploadRequest:
      type: object
      required: [data]
      properties:
        data:
          type: string
          description: Base64-encoded data to upload

    PrepareUploadRequest:
      type: object
      required: [path]
      properties:
        path:
          type: string
          description: Absolute path to local file

    PrepareUploadResponse:
      type: object
      required: [upload_id, payment_type, total_amount, payment_token_address, rpc_url]
      properties:
        upload_id:
          type: string
          description: Opaque token to pass back to finalize
        payment_type:
          type: string
          enum: [wave_batch, merkle]
          description: >-
            Discriminator for payment flow. "wave_batch" (< 64 chunks) means
            call payForQuotes() and finalize with tx_hashes. "merkle" (>= 64 chunks)
            means call payForMerkleTree() and finalize with winner_pool_hash.
        # -- Wave-batch fields (present when payment_type == "wave_batch") --
        payments:
          type: array
          items:
            $ref: "#/components/schemas/PaymentEntry"
          description: Per-quote payment entries for payForQuotes() (wave_batch only)
        data_payments_address:
          type: string
          description: Data payments contract address (wave_batch only)
        # -- Merkle fields (present when payment_type == "merkle") --
        depth:
          type: integer
          description: Merkle tree depth 1-8 (merkle only)
        pool_commitments:
          type: array
          items:
            $ref: "#/components/schemas/PoolCommitmentEntry"
          description: Pool commitments for payForMerkleTree() (merkle only)
        merkle_payment_timestamp:
          type: integer
          format: int64
          description: Unix timestamp for the merkle payment (merkle only)
        merkle_payments_address:
          type: string
          description: Merkle payment vault contract address (merkle only)
        # -- Common fields --
        total_amount:
          type: string
          description: >-
            Total amount to pay (atto tokens as decimal string).
            For merkle this is "0" since cost is determined on-chain.
        payment_token_address:
          type: string
          description: Payment token contract address (hex with 0x prefix)
        rpc_url:
          type: string
          description: EVM RPC URL for submitting transactions

    PoolCommitmentEntry:
      type: object
      required: [pool_hash, candidates]
      properties:
        pool_hash:
          type: string
          description: Pool hash (hex, 32 bytes with 0x prefix)
        candidates:
          type: array
          minItems: 16
          maxItems: 16
          items:
            $ref: "#/components/schemas/CandidateNodeEntry"
          description: Exactly 16 candidate nodes

    CandidateNodeEntry:
      type: object
      required: [rewards_address, amount]
      properties:
        rewards_address:
          type: string
          description: Node rewards address (hex with 0x prefix, 20 bytes)
        amount:
          type: string
          description: Node price (decimal string)

    PaymentEntry:
      type: object
      required: [quote_hash, rewards_address, amount]
      properties:
        quote_hash:
          type: string
          description: Quote hash (hex, 32 bytes)
        rewards_address:
          type: string
          description: Rewards address (hex with 0x prefix, 20 bytes)
        amount:
          type: string
          description: Amount to pay (atto tokens as decimal string)

    FinalizeUploadRequest:
      type: object
      required: [upload_id]
      description: >-
        Provide either tx_hashes (wave_batch) or winner_pool_hash (merkle).
        The server validates based on the stored prepared upload type.
      properties:
        upload_id:
          type: string
          description: The upload_id returned from a prepare call
        tx_hashes:
          type: object
          additionalProperties:
            type: string
          description: >-
            Wave-batch only: map of quote_hash (hex) to tx_hash (hex) from
            the payForQuotes() on-chain payment
        winner_pool_hash:
          type: string
          description: >-
            Merkle only: bytes32 winner pool hash (hex with 0x prefix) from
            the MerklePaymentMade event emitted by payForMerkleTree()
        store_data_map:
          type: boolean
          default: false
          description: >-
            If true, store the DataMap on-network and return its address.
            If false (default), return the raw DataMap for caller-side storage.

    FinalizeUploadResponse:
      type: object
      required: [data_map, chunks_stored]
      properties:
        data_map:
          type: string
          description: Hex-encoded serialized DataMap (always returned)
        address:
          type: string
          description: Network address of the stored DataMap (only set when store_data_map=true)
        chunks_stored:
          type: integer
          description: Number of chunks stored on the network

    # -- Common --
    CostResponse:
      type: object
      required: [cost]
      properties:
        cost:
          type: string
          description: Cost in atto tokens

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: Error message

  responses:
    BadRequest:
      description: Invalid request (400)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    PaymentError:
      description: Insufficient funds (402)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found (404)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Resource already exists or version conflict (409)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    TooLarge:
      description: Payload too large (413)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalError:
      description: Internal server error (500)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ServiceUnavailable:
      description: Service unavailable — wallet not configured (503)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NetworkError:
      description: Network unreachable (502)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
