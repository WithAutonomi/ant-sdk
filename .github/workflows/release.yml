name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: antd-linux-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: antd-darwin-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: antd-windows-amd64.exe
    defaults:
      run:
        working-directory: antd
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: arduino/setup-protoc@v3
        with:
          version: "25.x"
          # Authenticate to GitHub so the action's release-list API calls
          # use our 5,000/hr token quota instead of the per-IP unauth
          # quota (~60/hr), which was exhausted by other macOS/Linux
          # runners on the same egress IP and failed the v0.3.0 and
          # v0.5.0 releases. Reproduced 2026-04-28 against runs
          # 24506528329 and 25060322954.
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          ext=""
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then ext=".exe"; fi
          cp "target/${{ matrix.target }}/release/antd${ext}" "${{ matrix.artifact }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: antd/${{ matrix.artifact }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
