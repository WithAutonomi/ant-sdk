name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: antd-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            artifact: antd-linux-arm64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: antd-darwin-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: antd-windows-amd64.exe
    defaults:
      run:
        working-directory: antd
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: arduino/setup-protoc@v3
        with:
          version: "25.x"
          # Authenticate to GitHub so the action's release-list API calls
          # use our 5,000/hr token quota instead of the per-IP unauth
          # quota (~60/hr), which was exhausted by other macOS/Linux
          # runners on the same egress IP and failed the v0.3.0 and
          # v0.5.0 releases. Reproduced 2026-04-28 against runs
          # 24506528329 and 25060322954.
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          ext=""
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then ext=".exe"; fi
          cp "target/${{ matrix.target }}/release/antd${ext}" "${{ matrix.artifact }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: antd/${{ matrix.artifact }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true

  docker:
    name: Docker (multi-arch)
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # Pull the two linux binaries the build matrix just produced into the
      # docker build context. The Dockerfile COPYs them by ${TARGETARCH}.
      - uses: actions/download-artifact@v4
        with:
          name: antd-linux-amd64
          path: deploy/

      - uses: actions/download-artifact@v4
        with:
          name: antd-linux-arm64
          path: deploy/

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Compose the tag list. :latest moves only on stable releases — a
      # pre-release tag like v1.0.0-rc.1 publishes :v1.0.0-rc.1 only.
      - name: Compute tags
        id: tags
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          tags="ghcr.io/withautonomi/antd:${VERSION}"$'\n'
          tags+="withautonomi/antd:${VERSION}"
          if [[ "${VERSION}" != *-* ]]; then
            tags+=$'\n'"ghcr.io/withautonomi/antd:latest"
            tags+=$'\n'"withautonomi/antd:latest"
          fi
          {
            echo "tags<<TAGS_EOF"
            echo "$tags"
            echo "TAGS_EOF"
          } >> "$GITHUB_OUTPUT"
          echo "Computed tags:"
          echo "$tags"

      - name: Build and push (linux/amd64,linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: deploy/
          file: deploy/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.title=antd
            org.opencontainers.image.description=REST + gRPC gateway for the Autonomi network
            org.opencontainers.image.source=https://github.com/WithAutonomi/ant-sdk
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=GPL-3.0
          cache-from: type=gha,scope=docker-release
          cache-to: type=gha,scope=docker-release,mode=max
