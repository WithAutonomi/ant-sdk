name: FFI CI

# CI for the `ant-ffi` crate (ffi/rust/ant-ffi) — the UniFFI surface that the
# ant-swift / ant-android SDKs ship. This subtree previously had no CI, so
# PRs touching it had no automated signal (build/clippy/fmt/test/bindgen were
# only ever run locally). Mirrors the `check-antd` job in ci.yml.

on:
  push:
    branches: [main]
    # `!**/*.md` skips CI when only docs changed. GitHub Actions allows EITHER
    # `paths` OR `paths-ignore`, not both, so the negation lives inside `paths`.
    paths:
      - "ffi/rust/**"
      - "ffi/scripts/**"
      - "ffi/android/**"
      - "ffi/kotlin/**"
      - ".github/workflows/ffi-ci.yml"
      - "!**/*.md"
  pull_request:
    paths:
      - "ffi/rust/**"
      - "ffi/scripts/**"
      - "ffi/android/**"
      - "ffi/kotlin/**"
      - ".github/workflows/ffi-ci.yml"
      - "!**/*.md"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

# Cancel in-flight PR runs when a new push lands on the same PR. Main pushes
# never cancel — each commit needs full coverage.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check-ant-ffi:
    name: Check (ant-ffi)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ffi/rust
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ffi/rust

      - uses: arduino/setup-protoc@v3
        with:
          version: "25.x"
          # Authenticate to lift the action's release-list call from the
          # ~60/hr per-IP unauth quota onto our 5,000/hr token quota.
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features --locked -- -D warnings

      - name: Build docs
        run: cargo doc --locked --no-deps

      - name: Run tests
        run: cargo test --locked

      # Smoke-test the UniFFI foreign-binding generation. A plain `cargo build`
      # does not exercise `#[uniffi::export]` metadata, so a broken export
      # surface (the kind that only shows up when Swift/Kotlin is generated)
      # would otherwise slip through. This is the check reviewers were running
      # by hand. No Xcode/NDK needed — generation emits source, not artifacts.
      - name: UniFFI binding generation (Swift + Kotlin)
        run: |
          set -euo pipefail
          cargo build --release --locked -p ant-ffi
          cargo build --release --locked --bin uniffi-bindgen
          out="$(mktemp -d)"
          # Linux cdylib is libant_ffi.so (not .dylib).
          lib="target/release/libant_ffi.so"
          ./target/release/uniffi-bindgen generate --library "$lib" --language swift  --out-dir "$out"
          ./target/release/uniffi-bindgen generate --library "$lib" --language kotlin --out-dir "$out"
          # Fail loudly if nothing was emitted.
          test -n "$(find "$out" -name '*.swift')" || { echo "no Swift bindings generated"; exit 1; }
          test -n "$(find "$out" -name '*.kt')"    || { echo "no Kotlin bindings generated"; exit 1; }
          echo "Generated Swift + Kotlin bindings OK"

  # RUSTSEC audit of the ffi dependency tree. Mirrors the `audit` job in ci.yml
  # (which only covered antd / antd-rust) — the ffi subtree previously had no
  # audit, so AntFfi releases could ship transitively-vulnerable crates (e.g.
  # crossbeam-epoch RUSTSEC-2026-0204, rustls-webpki RUSTSEC-2026-0098/0099/0104
  # were only caught after v0.0.5 shipped). Runs on the same triggers as the
  # rest of this workflow, so ffi-only PRs get audited.
  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: Swatinem/rust-cache@v2
        with:
          key: cargo-audit-tool

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit ant-ffi dependencies
        working-directory: ffi/rust
        run: cargo audit

  # Cheap Linux-safe checks for the packaging paths (build scripts, the
  # Android/Kotlin gradle projects, the privacy manifest, the vendored
  # bootstrap-peer list). These paths previously triggered NO workflow at all,
  # so packaging PRs shipped with zero automated signal. Full artifact proof
  # (xcframework contents, AAR alignment) still happens at the release build;
  # compile/AAR/R8 coverage is tracked separately (V2-651).
  packaging:
    name: Packaging checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Shell syntax (bash -n) on build scripts
        run: |
          set -euo pipefail
          for f in ffi/scripts/*.sh; do bash -n "$f" && echo "parses: $f"; done

      - name: Privacy-manifest plist syntax
        run: |
          set -euo pipefail
          found=0
          for f in ffi/scripts/*.xcprivacy; do
            [ -e "$f" ] || continue
            python3 -c 'import plistlib,sys; plistlib.load(open(sys.argv[1],"rb"))' "$f"
            echo "plist OK: $f"
            found=1
          done
          [ "$found" = 1 ] || echo "no .xcprivacy files yet (lands with the privacy-manifest PR)"

      # The vendored copy compiled into connect_default* must match the pinned
      # ant-client tag's resources/bootstrap_peers.toml — this makes forgetting
      # the re-copy at a pin bump a CI failure instead of stale bootstrap
      # shipping to production apps. (V2-698)
      - name: Vendored bootstrap peers match the pinned ant-client tag
        run: |
          set -euo pipefail
          vendored="ffi/rust/ant-ffi/resources/bootstrap_peers.toml"
          if [ ! -f "$vendored" ]; then
            echo "no vendored peers file yet (lands with the connect_default PR)"; exit 0
          fi
          tag="$(sed -n 's/.*tag = "\(ant-cli-v[^"]*\)".*/\1/p' ffi/rust/ant-ffi/Cargo.toml | head -1)"
          test -n "$tag" || { echo "could not read the ant-client tag from Cargo.toml" >&2; exit 1; }
          curl -fsSL "https://raw.githubusercontent.com/WithAutonomi/ant-client/$tag/resources/bootstrap_peers.toml" \
            -o /tmp/upstream_peers.toml
          diff -u /tmp/upstream_peers.toml "$vendored"
          echo "vendored peers match $tag"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      # Configuration + dependency resolution only (no .so files needed):
      # proves the AAR's declared deps (JNA, coroutines) actually resolve on
      # Maven Central at the pinned versions.
      - name: Android dependency-resolution smoke
        working-directory: ffi/android
        run: |
          set -euo pipefail
          gradle --no-daemon --console=plain dependencies \
            --configuration releaseRuntimeClasspath > /tmp/deps.txt
          grep -E "net\.java\.dev\.jna:jna" /tmp/deps.txt \
            || { echo "JNA did not resolve" >&2; cat /tmp/deps.txt; exit 1; }
          echo "resolved:"; grep -E "net\.java\.dev\.jna:jna|kotlinx-coroutines-core" /tmp/deps.txt | sort -u | head -5
