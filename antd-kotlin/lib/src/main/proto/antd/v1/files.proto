syntax = "proto3";

package antd.v1;

option csharp_namespace = "Antd.V1";

import "antd/v1/common.proto";

service FileService {
  rpc UploadPublic(UploadFileRequest) returns (UploadPublicResponse);
  rpc DownloadPublic(DownloadPublicRequest) returns (DownloadResponse);
  rpc DirUploadPublic(UploadFileRequest) returns (UploadPublicResponse);
  rpc DirDownloadPublic(DownloadPublicRequest) returns (DownloadResponse);
  rpc GetFileCost(FileCostRequest) returns (Cost);
}

message UploadFileRequest {
  string path = 1; // local filesystem path
}

message UploadPublicResponse {
  Cost cost = 1;
  string address = 2; // hex
}

message DownloadPublicRequest {
  string address = 1;   // hex
  string dest_path = 2; // local filesystem path
}

message DownloadResponse {}

message FileCostRequest {
  string path = 1;
  bool is_public = 2;
}
