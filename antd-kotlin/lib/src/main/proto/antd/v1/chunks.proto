syntax = "proto3";

package antd.v1;

option csharp_namespace = "Antd.V1";
option go_package = "github.com/WithAutonomi/ant-sdk/antd-go/proto/antd/v1;v1";

import "antd/v1/common.proto";

service ChunkService {
  rpc Get(GetChunkRequest) returns (GetChunkResponse);
  rpc Put(PutChunkRequest) returns (PutChunkResponse);
}

message GetChunkRequest {
  string address = 1; // hex
}

message GetChunkResponse {
  bytes data = 1;
}

message PutChunkRequest {
  bytes data = 1;
}

message PutChunkResponse {
  Cost cost = 1;
  string address = 2; // hex
}
