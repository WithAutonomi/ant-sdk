syntax = "proto3";

package antd.v1;

option csharp_namespace = "Antd.V1";
option go_package = "github.com/WithAutonomi/ant-sdk/antd-go/proto/antd/v1;v1";

import "antd/v1/common.proto";

service DataService {
  // Private = unqualified verb (the DataMap is returned to the caller; it is
  // NOT stored on the network). Public = `_public` suffix (the DataMap is
  // additionally stored on-network and the call returns the resulting address).
  rpc Put(PutDataRequest) returns (PutDataResponse);
  rpc PutPublic(PutPublicDataRequest) returns (PutPublicDataResponse);
  rpc Get(GetDataRequest) returns (GetDataResponse);
  rpc GetPublic(GetPublicDataRequest) returns (GetPublicDataResponse);
  // Streaming downloads — constant memory, one decrypt batch at a time.
  // Private streams from a caller-held DataMap; public resolves the address
  // to a DataMap first (Stream is the primitive, StreamPublic wraps it).
  rpc Stream(StreamDataRequest) returns (stream DataChunk);
  rpc StreamPublic(StreamPublicDataRequest) returns (stream DataChunk);
  rpc Cost(DataCostRequest) returns (antd.v1.Cost);
}

// --- Public ---

message GetPublicDataRequest {
  string address = 1; // hex
}

message GetPublicDataResponse {
  bytes data = 1;
}

message PutPublicDataRequest {
  bytes data = 1;
  // Optional payment mode: "auto" (default), "merkle", or "single". Empty
  // string is treated as "auto" so old clients omitting the field stay
  // wire-compatible.
  string payment_mode = 2;
}

message PutPublicDataResponse {
  Cost cost = 1;
  string address = 2; // hex
  // Number of chunks stored on the network.
  uint64 chunks_stored = 3;
  // Which payment mode was actually used ("auto", "merkle", or "single").
  string payment_mode_used = 4;
}

message StreamPublicDataRequest {
  string address = 1; // hex
  // When true, the server interleaves DownloadProgress frames with the data
  // frames on the same stream so the caller can drive a determinate fetch
  // progress bar. Defaults to false — old clients omitting it receive a
  // pure data-frame stream, byte-identical to the pre-progress behaviour.
  bool include_progress = 2;
}

// A single frame of a streaming download. Exactly one of `data` (a decrypted
// plaintext chunk) or `progress` (a fetch-progress update) is set per frame.
// `data` keeps wire tag 1, so a frame carrying data is byte-identical to the
// pre-oneof `DataChunk { bytes data = 1 }` — only opt-in progress consumers
// ever observe `progress` frames (see StreamDataRequest.include_progress).
message DataChunk {
  oneof kind {
    bytes data = 1;
    DownloadProgress progress = 2;
  }
}

// Fetch-progress update surfaced from ant-core's DownloadEvent. `fetched` /
// `total` count chunks (not bytes); `total` is 0 while still unknown (e.g.
// mid DataMap-resolution). This is the *numerator* for a real progress bar —
// the x-content-length header / Content-Length is the byte *denominator*, but
// decrypted-byte delivery lands in lumps, so chunk-fetch counts are what
// actually advance smoothly during a download.
message DownloadProgress {
  // One of: "resolving_map", "resolved", "fetching".
  string phase = 1;
  // Chunks fetched so far in the current phase.
  uint64 fetched = 2;
  // Total chunks for the current phase, or 0 if not yet known.
  uint64 total = 3;
}

// --- Private ---

message GetDataRequest {
  string data_map = 1; // hex
}

message StreamDataRequest {
  string data_map = 1; // hex
  // See StreamPublicDataRequest.include_progress. Defaults to false.
  bool include_progress = 2;
}

message GetDataResponse {
  bytes data = 1;
}

message PutDataRequest {
  bytes data = 1;
  // Optional payment mode: "auto" (default), "merkle", or "single". Empty
  // string is treated as "auto" so old clients omitting the field stay
  // wire-compatible.
  string payment_mode = 2;
}

message PutDataResponse {
  Cost cost = 1;
  string data_map = 2; // hex
  // Number of chunks stored on the network.
  uint64 chunks_stored = 3;
  // Which payment mode was actually used ("auto", "merkle", or "single").
  string payment_mode_used = 4;
}

// --- Cost ---

message DataCostRequest {
  bytes data = 1;
  // Optional payment mode the estimate should reflect: "auto" (default),
  // "merkle", or "single". Empty string is treated as "auto".
  string payment_mode = 2;
}
